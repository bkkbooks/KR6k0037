body:
  text: 三藏法師義淨奉制譯尼陀那五十二頌目得迦四十八頌大門總攝頌曰初明受近圓次分亡人物圓壇并戶鉤菩薩像五門別門初總攝頌曰此有十事盡不截皮近圓知日數界別不入地界邊五衆居不截皮生肉第一子攝頌曰近圓男女狀非近圓為師難等十無師莫授我七歲第二子攝頌曰日數每應知告白夜須減六日十八日說戒不應頻第三子攝頌曰界別不告淨亦不為羯磨乘空不持欲解前方結後第四子攝頌曰不入界捨界出放光說二頌樹界有世尊不越及可越羯磨者身死第五子攝頌曰地牆等秉事結界無與欲但於一處坐得為四羯磨第六子攝頌曰大界兩驛半下水上山顛異見明相過五衆受七日第七子攝頌曰五衆坐安居親等請日去於經有疑問求解者應行第八子攝頌曰假令不截衣有緣皆得著衣可隨身量若短作篅衣第九子攝頌曰不畜五種皮由有過失故開許得用處齊坐臥容身第十子攝頌曰生肉及諸醋有五種不同痔病爪不傷回施知希望別門第二總攝頌曰分亡及唱導張衣授學人重作收攝驅求寂同牆上第一子攝頌曰分亡者衣物互無應互取見鬪應須諫隨頭向處分第二子攝頌曰唱導乘與車得衣應舉掌僧伽獲衣利凡聖可同分第三子攝頌曰有張有不張有出有不出若在於界外聞生隨喜心第四子攝頌曰授學等不秉作法不成訶十二人成訶不淨犯根本第五子攝頌曰更應重作法勿使求寂行守護善用心見處離聞處第六子攝頌曰收攝於界內於衆心降伏截柱及門框尼等同驅擯第七子攝頌曰破戒應驅逐伏處亦皆除惱俗應收謝餘衆咸同此第八子攝頌曰與求寂令怖為受成近圓五法成就時五夏離依去第九子攝頌曰同分非同分有齊限及無有覆無覆殊名一種便異第十子攝頌曰不牆上行法非於一二三不對破戒人不取授學欲別門第三總攝頌曰圓壇求寂墮一衣烟藥器鐵椎髮及門不應隨鐵作第一子攝頌曰圓壇及天廟兩驛半依止無鉢不度人鉢等不書字第二子攝頌曰求寂墮鉢破開餘存念者作二種薰籠并隨所須物第三子攝頌曰一衣不互作澡浴可遮人於褥不剃頭病人隨服食第四子攝頌曰烟筒壞色衣鼻筒飲水器針筒非寶物眼藥合并椎第五子攝頌曰藥器及𣰽毺承足枮瀉藥苾芻不應作當擇死人衣第六子攝頌曰鐵椎并杵杓身自不負擔以食供父母毛毯不充衣第七子攝頌曰髮爪窣覩波任作鮮白色隨意安燈處一畔出高簷第八子攝頌曰門戶并簷屋及以塔下基赤石紫礦塗此等皆隨作第九子攝頌曰不應以橛釘及升窣覩波開許金銀花塔上以舍蓋第十子攝頌曰鐵作窣覩波及以金銀等許幡旗供養并可用香油別門第四總攝頌曰戶鐶隨處用霑衣大小便染衣揁認衣賒衣果無淨第一子攝頌曰戶鐶倚帶網取米為衆食寺內作私房居人應受用第二子攝頌曰隨處當用物營作人所須器具食燈油隨施主應用第三子攝頌曰令雨霑僧物夜半共分床小座並依年敷席咸同此第四子攝頌曰大小便利處經行不惱他洗足及拭鞋釜篦不奪用第五子攝頌曰染釜及水瓶僧鉢并飲器刀石爪鼻物支床不問年第六子攝頌曰羯恥那衣揁絣線正縫時染汁雜物等用時不應奪第七子攝頌曰外道覆認衣作記死時施有五種親友得法獨應行第八子攝頌曰賒取他衣去及為他和市不高下買衣應二三酬價第九子攝頌曰果園差修理四種不應分果熟現前分觀時莫喧戲第十子攝頌曰無淨人自行自取不應食不選開其病結界證耕人別門第五總攝頌曰菩薩像供養吉祥大衆食大會草稕居集僧鳴大鼓第一子攝頌曰聽為菩薩像復許五種旗為座置尊儀鐵干隨意作第二子攝頌曰供養菩薩像并作諸瓔珞塗香及車輿作傘蓋旗幡第三子攝頌曰吉祥并供養花鬘及香合諸人大集時晝開門夜關第四子攝頌曰大衆集會食薜舍佉月生香臺五六年並應為大會第五子攝頌曰大會為草稕不應雜亂坐應打揵稚鼓告時令普知第六子攝頌曰集僧鳴大鼓供了去幢幡若多獲珍財隨應悉分與大門總攝頌曰目得迦四十八頌最初為懺謝第二定屬物第三資具衣目得迦總頌別門第一總攝頌曰懺謝草田中合免王影勝糖酥根等聽狗肉盞甘蔗第一子攝頌曰懺謝非近圓觀求寂相貌苾芻與尼法若互秉皆成第二子攝頌曰草田村略說生心褒灑陀賊縛不同愆六開僧教罪第三子攝頌曰合免者應放穿渠遣衆行一日至四旬皮肉皆不淨第四子攝頌曰影勝王床施王母物入僧烏燕鶴鷲雕苾芻不應食第五子攝頌曰狗肉不應噉并食尸鳥獸及以同蹄畜亦不食獼猴第六子攝頌曰小盞及衣角皮葉等有過除其鐵一種餘物任情為第七子攝頌曰甘蔗酪肉麻藥有四種別大麻蔓菁粥根等粥應餐第八子攝頌曰開許沙糖飲得為七日藥生心為五事益彼應共分第九子攝頌曰醫教應服酥油及餘殘觸并開眼藥合除十為淨厨第十子攝頌曰根莖葉花果皆應淡酒浸水攪而飲用并許其異食別門第二總攝頌曰定物有主處須問憍薩羅從像豫先差大減會尼衆第一子攝頌曰定物不應移莫拾賊遺物尸林亦復爾隨許並應收第二子攝頌曰有主天廟物苾芻不應取看病人不應勸他捨法服第三子攝頌曰物須問施主衆利可平分二大合均分餘衆應加減第四子攝頌曰憍薩羅白疊佛子因餐室利笈多緣廣論營造事第五子攝頌曰從像入城中受吉祥施物旗鼓隨情設苾芻皆不應第六子攝頌曰豫先為唱令五衆從行城應差掌物人尼無別輪法第七子攝頌曰應差分物人上座宜准價不得輒酬直索價返還衣第八子攝頌曰寺大減其層將衣者應用恐怖若止息准式用僧祇第九子攝頌曰若有大聚會鳴鼓集衆僧衆大別為行檢校人先食第十子攝頌曰凡於尼衆首應安一空座為待餘苾芻孤苦勿增價第三別門總攝頌曰資具衣愚癡若差不用俗正作長者施剃刀窣覩波飯酪葉承水及洗鉢等事此之十二頌總攝要應知第一子攝頌曰十三資具物牒名而守持自餘諸長衣委寄應分別第二子攝頌曰癡不了三藏此等十二人失性復本時訶言應採録第三子攝頌曰若差十二人斯語成訶法受時言我俗此不成近圓第四子攝頌曰不用五種脂隨應為說戒因億耳開粥王田衆應受第五子攝頌曰俗人求寂等並不合同坐兩學有難緣同處非成過第六子攝頌曰正作不令起隨年坐染盆應共護僧園勿燒營作木第七子攝頌曰長者所施物問已應留舉隨處莫廢他洗身方入寺第八子攝頌曰剃刀并鑷子用竟不應留便利若了時無宜室中住第九子攝頌曰窣覩波圍繞廣陳諸聖迹濁水隨應飲若醎分別知第十子攝頌曰餅酪等非污亦可內瓶中洗足五種瓨齊何名口淨葉手承注口多疑流鉢中舉糧持渡河縱觸非成過洗鉢應用心他觸問方受換食持糧等無難並還遮別門第四總攝頌曰與田分不應赤體定物施僧衣字還往甘蔗果客裙第一子攝頌曰與田分相助車船沸自取鳥蠅無慚制底信少欲第二子攝頌曰不應令賊住及以黃門等乃至授學人行籌破僧衆第三子攝頌曰不赤體披衣冒雨向厨內便利宜縫補和泥福久增第四子攝頌曰定物施此中不應餘處食若有將去者並須依價還第五子攝頌曰僧衣題施主別人施私記氍氀許別人尼夏應修理第六子攝頌曰若還往衣物送來應為受為衆取他財將衆物還價第七子攝頌曰甘蔗等平分不應分口腹四事無分法臥具夜不行第八子攝頌曰果由藥叉施淨之方受食餘者為漿飲不燒地燈臺第九子攝頌曰客舊宜詳審授受分明付五開應總閉肘短可隨身第十子攝頌曰裙及僧腳欹香泥污衣洗取食除多分須知十種塵大唐景龍四年歲次庚戌四月壬午朔十五日景申三藏法師大德沙門義淨宣釋梵本并綴文正字翻經沙門吐火羅大德達摩秫唐證梵義翻經沙門中天竺國大德校努證梵義翻經沙門罽賓國大德達摩難陀證梵文翻經沙門淄州大雲寺大德慧沼證義翻經沙門洛州崇光寺大德律師道琳證義翻經沙門福壽寺寺主大德利明證義翻經沙門洛州太平寺大德律師道恪證義翻經沙門大薦福寺大德勝莊證義翻經沙門相州禪河寺大德玄傘證義筆受翻經沙門大薦福寺大德律師智積證義正字翻經沙門德州大雲寺寺主慧傘證義翻經沙門西涼州白塔寺大德慧積讀梵本翻經婆羅門右驍衛翊府中郎員外置宿衛臣李釋迦讀梵本翻經婆羅門東天竺國左屯翊府中郎將員外置同正員臣瞿金剛證譯翻經婆羅門東天竺國大首領臣伊舍羅證梵本翻經婆羅門東天竺國左執戟直中書省臣度頗具讀梵本翻經婆羅門龍播國大達官准三品臣李輸羅證譯金紫光祿大夫守尚書左僕射同中書門下三品上柱國館國公臣韋洰源等及修文館學士二十六人同監判官朝散大夫行著作佐郎臣劉令植使金紫光祿大夫行祕書監檢校殿中監兼知內外間厩隴右三使上柱國嗣虢王臣雍
